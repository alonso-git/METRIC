<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>METRIC - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-950 flex justify-center items-center h-screen font-sans">
    <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-xl w-96 text-white">
        <div class="mb-6 text-center">
            <h2 class="text-3xl font-extrabold text-blue-500 tracking-wide">METRIC</h2>
            <p class="text-slate-400 text-sm mt-1">AI Support Chat System</p>
        </div>
        <div class="space-y-4">
            <div>
                <label for="username"
                    class="block mb-1.5 text-xs font-bold uppercase tracking-wider text-slate-400">Usuario</label>
                <input type="text" id="username"
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500 transition-colors"
                    placeholder="Ingresa tu usuario">
            </div>
            <div>
                <label for="password"
                    class="block mb-1.5 text-xs font-bold uppercase tracking-wider text-slate-400">Contraseña</label>
                <input type="password" id="password"
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500 transition-colors"
                    placeholder="••••••••">
            </div>
            <button id="loginBtn"
                class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg transition-colors cursor-pointer">
                Log in
            </button>
        </div>
        <div id="message" class="mt-4 text-center text-sm font-medium min-h-[20px]"></div>
    </div>
    <script type="module" src="js/auth/authUI.js"></script>
</body>

</html>
