<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METRIC - Customer Support</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-950 text-slate-100 flex flex-col h-screen font-sans">

    <header class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <h1 class="text-lg font-bold tracking-tight text-white">METRIC <span
                    class="text-blue-400 text-xs font-medium ml-2">Customer Hub</span></h1>
        </div>
        <button onclick="localStorage.clear(); window.location.href='index.html';"
            class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-lg transition-colors cursor-pointer">
            Logout
        </button>
    </header>

    <main class="flex-1 flex flex-col max-w-3xl w-full mx-auto p-4 md:p-6 overflow-hidden">

        <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 mb-4 text-center">
            <p class="text-sm text-slate-300">How can we help you today? An agent will be with you shortly.</p>
        </div>

        <div id="clientChatStream" class="flex-1 space-y-4 overflow-y-auto pr-2 mb-4">
            <div class="flex items-start space-x-3">
                <div
                    class="bg-blue-600/20 text-blue-400 border border-blue-500/30 text-xs font-bold px-2 py-1 rounded-md mt-1">
                    AI
                </div>
                <div
                    class="bg-slate-900 border border-slate-800 rounded-2xl px-4 py-2.5 max-w-[85%] text-sm text-slate-200">
                    Hello! Welcome to METRIC support. Please describe your issue or question below so our team can
                    assist you right away.
                </div>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-xl p-3 flex items-center space-x-3 shadow-xl">
            <input type="text" id="clientMessageInput" placeholder="Type your request here..."
                class="flex-1 bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500 transition-colors">
            <button
                id="clientSendBtn"
                class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition-colors cursor-pointer shadow-md">
                Send
            </button>
        </div>
    </main>
    <script type="module" src="js/chat/clientChatUI.js"></script>
</body>

</html>
